server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # version.json wordt door plugins gepolld; nooit stale cachen
    location ~ \.json$ {
        add_header Cache-Control "no-cache, max-age=60";
        add_header Access-Control-Allow-Origin "*";
    }

    # Installers: lange cache, bestandsnaam bevat de versie
    location ~ \.(pkg|dmg|sha256)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
